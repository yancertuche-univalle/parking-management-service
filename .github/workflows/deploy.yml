name: Build and Deploy

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout del código
      # ─────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Configurar JDK 17
      # ─────────────────────────────────────────────
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─────────────────────────────────────────────
      # 3. Cache de dependencias Maven
      # ─────────────────────────────────────────────
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ─────────────────────────────────────────────
      # 4a. Permisos al wrapper de Maven
      # ─────────────────────────────────────────────
      - name: Permisos mvnw
        run: chmod +x mvnw

      # ─────────────────────────────────────────────
      # 4b. Build del proyecto (sin tests para agilizar CI)
      # ─────────────────────────────────────────────
      - name: Build con Maven
        run: ./mvnw clean package -DskipTests

      # ─────────────────────────────────────────────
      # 5. Login en DockerHub
      # ─────────────────────────────────────────────
      - name: Login en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ─────────────────────────────────────────────
      # 6. Extraer short SHA del commit (7 caracteres)
      # ─────────────────────────────────────────────
      - name: Obtener short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────
      # 7. Build de la imagen Docker con dos tags:
      #      - latest
      #      - <commit-sha>
      # ─────────────────────────────────────────────
      - name: Build imagen Docker
        run: |
          docker build \
            -t anborja/parking-api:latest \
            -t anborja/parking-api:${{ steps.vars.outputs.SHORT_SHA }} \
            .

      # ─────────────────────────────────────────────
      # 8. Push de ambos tags a DockerHub
      # ─────────────────────────────────────────────
      - name: Push imagen a DockerHub
        run: |
          docker push anborja/parking-api:latest
          docker push anborja/parking-api:${{ steps.vars.outputs.SHORT_SHA }}

      # ─────────────────────────────────────────────
      # 9a. Trigger redeploy en RENDER
      # ─────────────────────────────────────────────
      - name: Trigger redeploy en Render
        run: |
          curl --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            --header 'accept: application/json' \
            --header "authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header 'content-type: application/json'

      # ─────────────────────────────────────────────
      # 10. Resumen del deploy
      # ─────────────────────────────────────────────
      - name: Resumen del deploy
        run: |
          echo "Deploy completado"
          echo "Imagen: anborja/parking-api:latest"
          echo "Tag commit: anborja/parking-api:${{ steps.vars.outputs.SHORT_SHA }}"
